<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Command Center | Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #e2e8f0;
            --clay-bg: #f8fafc;
            --shadow-outer: #cbd5e1;
            --shadow-inner: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-red: #ff4d4d;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden; 
        }
        
        .clay-card {
            background: var(--clay-bg);
            box-shadow: 20px 20px 40px var(--shadow-outer), 
                       -20px -20px 40px var(--shadow-inner),
                       inset 4px 4px 10px rgba(0,0,0,0.03),
                       inset -4px -4px 10px rgba(255,255,255,0.7);
            border-radius: 2.5rem;
        }

        .clay-pressed {
            background: var(--clay-bg);
            box-shadow: inset 8px 8px 16px var(--shadow-outer), 
                        inset -8px -8px 16px var(--shadow-inner);
            border-radius: 1.5rem;
            border: none;
            outline: none;
        }

        .clay-btn {
            background: var(--clay-bg);
            box-shadow: 10px 10px 20px var(--shadow-outer), 
                       -10px -10px 20px var(--shadow-inner),
                       inset 2px 2px 5px rgba(255,255,255,0.8);
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-btn:active {
            transform: scale(0.95);
            box-shadow: inset 6px 6px 12px var(--shadow-outer), 
                        inset -6px -6px 12px var(--shadow-inner);
        }

        .clay-icon-btn {
            background: var(--clay-bg);
            box-shadow: 8px 8px 16px var(--shadow-outer), 
                       -8px -8px 16px var(--shadow-inner),
                       inset 3px 3px 6px rgba(255,255,255,0.8);
            border-radius: 50%;
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 gap-4">

    <!-- Header -->
    <!-- Header -->
    <header class="clay-card p-6 flex justify-between items-center z-20 border-4 border-white/50">
        <div class="flex items-center gap-6">
            <div class="w-16 h-16 clay-icon-btn flex items-center justify-center">
                <i class="fa-solid fa-satellite-dish text-[var(--accent-red)] text-3xl animate-pulse"></i>
            </div>
            <div>
                <h1 class="font-black text-3xl text-[var(--text-main)] tracking-tighter uppercase">CONTROL <span class="text-[var(--accent-red)]">GRID</span></h1>
                <p class="text-[9px] text-[var(--accent-green)] font-black tracking-[0.4em] uppercase mt-1"><i class="fa-solid fa-circle animate-pulse mr-2"></i> Real-time Active</p>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-4 clay-pressed px-8 py-4">
                <span class="relative flex h-4 w-4">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-4 w-4 bg-[var(--accent-red)]"></span>
                </span>
                <span class="text-[var(--accent-red)] font-black text-lg tracking-tighter uppercase" id="activeAlertsCount">0 ALERTS</span>
            </div>
            <a href="history.html" class="clay-btn px-8 py-4 text-xs font-black tracking-[0.2em] uppercase text-[var(--text-main)] hover:text-[var(--accent-blue)] flex items-center gap-3 transition-all"><i class="fa-solid fa-clock-rotate-left"></i> LOGS</a>
            <a href="index.html" class="w-16 h-16 clay-icon-btn text-[var(--text-main)] hover:text-[var(--accent-red)] flex items-center justify-center transition-all"><i class="fa-solid fa-power-off text-xl"></i></a>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden gap-4">
        
        <!-- Sidebar Alerts -->
        <aside class="w-[450px] clay-card flex flex-col z-20 overflow-hidden border-4 border-white/50">
            <div class="p-8 flex justify-between items-center border-b border-slate-300/30">
                <h2 class="font-black text-[var(--text-main)] tracking-tighter text-sm uppercase">SATELLITE <span class="text-[var(--accent-red)]">FEEDS</span></h2>
                <button class="clay-btn px-5 py-2 text-[8px] font-black uppercase tracking-widest text-[var(--text-muted)] hover:text-[var(--text-main)]">Filter Signals</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-8 space-y-8" id="alertsList">
                <div class="flex flex-col items-center justify-center h-full text-[var(--text-muted)] space-y-6">
                    <div class="w-24 h-24 clay-icon-btn flex items-center justify-center">
                        <i class="fa-solid fa-tower-broadcast animate-pulse text-4xl text-[var(--accent-green)]"></i>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] text-[var(--accent-green)]">Frequency Clear</p>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <section class="flex-1 clay-pressed relative overflow-hidden p-4 border-4 border-white/50">
            <iframe 
                width="100%" 
                height="100%" 
                frameborder="0" 
                style="border:0;" 
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14234.677953705256!2d80.9461!3d26.8467!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1" 
                allowfullscreen 
                class="map-tint rounded-[2.5rem]">
            </iframe>
            
            <!-- Overlay Info -->
            <div class="absolute top-10 right-10 clay-card p-8 w-72 z-30 border-4 border-white/50">
                <div class="flex items-center gap-4 mb-6 pb-6 border-b border-slate-300/30">
                    <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[var(--accent-red)]">
                        <i class="fa-solid fa-bullseye animate-spin-slow text-lg"></i>
                    </div>
                    <span class="text-[var(--text-main)] text-xs font-black tracking-tighter uppercase">Lock-on Grid</span>
                </div>
                <div class="space-y-4 mb-8">
                    <div class="clay-pressed p-4 flex flex-col gap-1">
                        <span class="text-[8px] font-black text-[var(--text-muted)] uppercase tracking-widest">Latitude</span>
                        <span id="overlayLat" class="text-sm font-black text-[var(--text-main)] tracking-widest">---</span>
                    </div>
                    <div class="clay-pressed p-4 flex flex-col gap-1">
                        <span class="text-[8px] font-black text-[var(--text-muted)] uppercase tracking-widest">Longitude</span>
                        <span id="overlayLng" class="text-sm font-black text-[var(--text-main)] tracking-widest">---</span>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[8px] text-[var(--text-muted)] font-black uppercase tracking-widest">Feed</span>
                    <span class="text-[9px] text-[var(--accent-green)] font-black tracking-[0.2em] animate-pulse uppercase">Live Track</span>
                </div>
            </div>
            
            <!-- Center Blinking Marker -->
            <div id="mapMarker" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center pointer-events-none hidden z-30">
                <span class="relative flex h-10 w-10">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[var(--accent-red)] opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-10 w-10 bg-[var(--accent-red)] border-4 border-white shadow-[0_0_20px_rgba(217,83,79,0.8)] flex items-center justify-center">
                      <i class="fa-solid fa-location-dot text-white text-sm"></i>
                  </span>
                </span>
                <div class="mt-3 bg-white/90 px-3 py-1 rounded-full text-[10px] font-extrabold text-[var(--accent-red)] tracking-widest shadow-lg uppercase animate-pulse border border-[var(--accent-red)]">
                    Target Location
                </div>
            </div>
            
        </section>

    </main>

    <script>
        // Security Check
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        // Initialize Supabase
        const supabaseUrl = 'https://zhsgoytovsjpvtdbibbc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dveXRvdnNqcHZ0ZGJpYmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY0MjIsImV4cCI6MjA5MzUzMjQyMn0.jNlo2UQ6aC0UIPc0HxayYjDxWz9WGCvDttTK-AP-LWs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchAlerts() {
            try {
                const { data: alerts, error } = await supabaseClient
                    .from('alerts')
                    .select('*')
                    .eq('status', 'ACTIVE')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                const alertsList = document.getElementById('alertsList');
                const countBadge = document.getElementById('activeAlertsCount');
                
                countBadge.textContent = `${alerts.length} ALERTS`;
                
                if (alerts.length > 0) {
                    alertsList.innerHTML = alerts.map(alert => {
                        const lat = alert.latitude;
                        const lng = alert.longitude;
                        const name = alert.name;
                        const time = alert.created_at;
                        return `
                        <div class="clay-btn p-6 cursor-pointer w-full text-left relative overflow-hidden group hover:scale-[1.02] transition-transform" onclick="updateMap(${lat}, ${lng})">
                            <div class="flex justify-between items-start mb-6">
                                <h3 class="font-black text-[var(--text-main)] text-xl tracking-tighter uppercase"><i class="fa-solid fa-triangle-exclamation mr-3 text-[var(--accent-red)] group-hover:animate-bounce"></i> ${name}</h3>
                                <span class="text-[8px] text-white bg-[var(--accent-red)] font-black tracking-widest px-4 py-1.5 rounded-full uppercase shadow-lg">SOS ACTIVE</span>
                            </div>
                            
                            <div class="clay-pressed p-4 space-y-3 mb-8">
                                <p class="text-[10px] text-[var(--text-muted)] font-black tracking-widest uppercase"><i class="fa-solid fa-clock-four mr-3 text-[var(--accent-blue)]"></i> ${new Date(time).toLocaleString()}</p>
                                <p class="text-[10px] text-[var(--text-muted)] font-black tracking-widest uppercase"><i class="fa-solid fa-phone-office mr-3 text-[var(--accent-green)]"></i> ${alert.phone || 'N/A'}</p>
                            </div>

                            <div class="flex gap-6">
                                <button onclick="event.stopPropagation(); dispatchPolice(this)" class="flex-1 clay-btn text-[var(--accent-blue)] text-[9px] py-4 font-black uppercase tracking-widest hover:text-[var(--accent-green)]"><i class="fa-solid fa-car-on mr-2 text-sm"></i> Dispatch</button>
                                <button onclick="event.stopPropagation(); resolveAlert(${alert.id})" class="flex-1 clay-pressed text-[var(--text-main)] hover:text-[var(--accent-red)] text-[9px] py-4 font-black uppercase tracking-widest transition-all"><i class="fa-solid fa-check-double mr-2 text-sm"></i> Resolve</button>
                            </div>
                        </div>
                    `;}).join('');
                    
                    // Auto-focus map on the newest alert
                    const firstAlert = alerts[0];
                    const firstLat = firstAlert.latitude || firstAlert.lat;
                    const firstLng = firstAlert.longitude || firstAlert.lng;
                    if (firstLat && firstLng) {
                        updateMap(firstLat, firstLng);
                    }
                } else {
                    alertsList.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-[var(--text-muted)]">
                            <div class="w-20 h-20 rounded-full neo-pressed flex items-center justify-center mb-6">
                                <i class="fa-solid fa-satellite animate-pulse text-3xl text-[var(--accent-green)]"></i>
                            </div>
                            <p class="text-xs font-bold uppercase tracking-widest text-[var(--accent-green)]">All Clear. Scanning...</p>
                        </div>
                    `;
                    // Reset map
                    document.getElementById('overlayLat').textContent = "---";
                    document.getElementById('overlayLng').textContent = "---";
                    document.getElementById('mapMarker').classList.add('hidden');
                    currentMapLat = null;
                    currentMapLng = null;
                }
            } catch (err) {
                console.error("Failed to fetch alerts");
            }
        }

        let currentMapLat = null;
        let currentMapLng = null;

        function updateMap(lat, lng) {
            const numLat = parseFloat(lat);
            const numLng = parseFloat(lng);
            if(isNaN(numLat) || isNaN(numLng)) return;
            
            document.getElementById('overlayLat').textContent = numLat.toFixed(4);
            document.getElementById('overlayLng').textContent = numLng.toFixed(4);
            
            // Show marker
            document.getElementById('mapMarker').classList.remove('hidden');

            // Prevent iframe flashing if coordinates are the same
            if(numLat === currentMapLat && numLng === currentMapLng) return;
            currentMapLat = numLat;
            currentMapLng = numLng;
            
            // Update iframe src dynamically
            const iframe = document.querySelector('iframe');
            iframe.src = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14234!2d${numLng}!3d${numLat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1`;
        }

        async function resolveAlert(id) {
            if(!confirm("Are you sure you want to mark this emergency as resolved?")) return;
            try {
                const { error } = await supabaseClient
                    .from('alerts')
                    .update({ status: 'RESOLVED', resolved_at: new Date().toISOString() })
                    .eq('id', id);
                
                if (error) throw error;
                fetchAlerts(); // Refresh the list instantly
            } catch (err) {
                console.error(err);
            }
        }

        function dispatchPolice(btn) {
            btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Dispatched`;
            btn.style.color = 'var(--accent-green)';
            alert("🚓 Police unit has been dispatched to the exact coordinates!");
        }

        // Poll every 5 seconds
        setInterval(fetchAlerts, 5000);
        fetchAlerts();
    </script>
</body>
</html>
