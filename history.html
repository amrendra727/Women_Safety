<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #e2e8f0;
            --clay-bg: #f8fafc;
            --shadow-outer: #cbd5e1;
            --shadow-inner: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-red: #ff4d4d;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        
        .clay-card {
            background: var(--clay-bg);
            box-shadow: 20px 20px 40px var(--shadow-outer), 
                       -20px -20px 40px var(--shadow-inner),
                       inset 4px 4px 10px rgba(0,0,0,0.03),
                       inset -4px -4px 10px rgba(255,255,255,0.7);
            border-radius: 2.5rem;
        }

        .clay-pressed {
            background: var(--clay-bg);
            box-shadow: inset 8px 8px 16px var(--shadow-outer), 
                        inset -8px -8px 16px var(--shadow-inner);
            border-radius: 1.5rem;
            border: none;
            outline: none;
        }

        .clay-btn {
            background: var(--clay-bg);
            box-shadow: 10px 10px 20px var(--shadow-outer), 
                       -10px -10px 20px var(--shadow-inner),
                       inset 2px 2px 5px rgba(255,255,255,0.8);
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-btn:active {
            transform: scale(0.95);
            box-shadow: inset 6px 6px 12px var(--shadow-outer), 
                        inset -6px -6px 12px var(--shadow-inner);
        }

        .clay-icon-btn {
            background: var(--clay-bg);
            box-shadow: 8px 8px 16px var(--shadow-outer), 
                       -8px -8px 16px var(--shadow-inner),
                       inset 3px 3px 6px rgba(255,255,255,0.8);
            border-radius: 50%;
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col gap-8 max-w-6xl mx-auto w-full">

    <header class="clay-card p-6 flex justify-between items-center border-4 border-white/50">
        <div class="flex items-center gap-6">
            <div class="w-16 h-16 clay-icon-btn flex items-center justify-center text-[var(--accent-red)] pointer-events-none">
                <i class="fa-solid fa-clock-rotate-left text-3xl"></i>
            </div>
            <div>
                <h1 class="font-black text-3xl text-[var(--text-main)] tracking-tighter uppercase">Signal <span class="text-[var(--accent-red)]">Logs</span></h1>
                <p class="text-[10px] text-[var(--text-muted)] font-black tracking-[0.4em] uppercase mt-1">Archived Police Intelligence</p>
            </div>
        </div>
        
        <div class="flex gap-6">
            <button onclick="fetchHistory()" class="clay-btn px-8 py-4 text-xs font-black tracking-widest text-[var(--accent-blue)] flex items-center gap-3 uppercase">
                <i class="fa-solid fa-sync-alt"></i> Sync
            </button>
            <button onclick="exportToCSV()" class="clay-btn px-8 py-4 text-xs font-black tracking-widest text-[var(--text-main)] flex items-center gap-3 uppercase">
                <i class="fa-solid fa-download"></i> Export
            </button>
            <a href="dashboard.html" class="clay-btn px-8 py-4 text-xs font-black tracking-widest text-[var(--accent-red)] flex items-center gap-3 uppercase transition-all">
                <i class="fa-solid fa-arrow-left"></i> Hub
            </a>
        </div>
    </header>

    <div class="clay-card flex-1 flex flex-col overflow-hidden mb-8 border-8 border-white/30">
        <div class="overflow-x-auto flex-1 clay-pressed m-8 rounded-[2rem]">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="text-[9px] uppercase tracking-[0.3em] text-[var(--text-muted)] font-black border-b border-slate-300/30">
                        <th class="p-8">Incident ID</th>
                        <th class="p-8">Victim / User</th>
                        <th class="p-8">Coordinates</th>
                        <th class="p-8">Timestamp</th>
                        <th class="p-8">Status</th>
                        <th class="p-8 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="text-xs font-black uppercase tracking-tighter">
                    <!-- Dynamically populated via JS -->
                </tbody>
            </table>
        </div>
        
        <div class="px-12 pb-10 pt-4 flex justify-between items-center text-[9px] text-[var(--text-muted)] font-black uppercase tracking-[0.4em]">
            <span>Total Units: <span id="totalRecords" class="text-[var(--text-main)]">0</span></span>
            <span id="fetchStatus" class="text-[var(--accent-blue)] animate-pulse">Initializing System...</span>
        </div>
    </div>

    <script>
        let currentAlerts = [];

        // Security Check
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        async function fetchHistory() {
            const status = document.getElementById('fetchStatus');
            const tbody = document.getElementById('historyTable');
            status.textContent = "Connecting to Database...";
            
            try {
                // Initialize Supabase locally to avoid global timing issues
                const supabaseUrl = 'https://zhsgoytovsjpvtdbibbc.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dveXRvdnNqcHZ0ZGJpYmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY0MjIsImV4cCI6MjA5MzUzMjQyMn0.jNlo2UQ6aC0UIPc0HxayYjDxWz9WGCvDttTK-AP-LWs';
                
                if (typeof supabase === 'undefined') {
                    status.textContent = "Error: Supabase library not loaded.";
                    return;
                }

                const client = supabase.createClient(supabaseUrl, supabaseKey);
                
                status.textContent = "Fetching records...";
                
                // Add cache buster timestamp to ensure fresh data
                const cacheBuster = Date.now();
                let response = await client.from('alerts').select('*', { count: 'exact' });
                
                // Fallback to capitalized table name if empty or error
                if (response.error || !response.data || response.data.length === 0) {
                    const fallback = await client.from('Alerts').select('*');
                    if (!fallback.error && fallback.data && fallback.data.length > 0) {
                        response = fallback;
                    }
                }

                const { data: alerts, error } = response;

                if (error) {
                    status.textContent = "Error: " + error.message;
                    alert("Supabase Error!\nURL: " + supabaseUrl + "\nMessage: " + error.message);
                    return;
                }
                
                status.textContent = "Sync Complete";
                currentAlerts = alerts || [];
                document.getElementById('totalRecords').textContent = currentAlerts.length;
                
                if (!alerts || alerts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-[var(--text-muted)]">No records found. <br><br> 1. Check if RLS SELECT policy is enabled. <br> 2. Ensure table name is exactly "alerts".</td></tr>';
                    return;
                }

                // Debug: Show first record in alert to confirm data arrival
                console.log("Data Received:", alerts);

                tbody.innerHTML = alerts.map(alert => {
                    const isResolved = alert.status === 'RESOLVED';
                    const time = alert.created_at || alert.time || new Date().toISOString();
                    const dateObj = new Date(time);
                    
                    // Safe ID display
                    const displayId = alert.id ? alert.id.toString().slice(-4) : '####';
                    
                    const statusHtml = isResolved 
                        ? `<span class="clay-pressed inline-flex items-center gap-3 px-6 py-2.5 text-[8px] font-black tracking-widest text-[var(--accent-green)]">
                                <span class="w-2.5 h-2.5 rounded-full bg-[var(--accent-green)] shadow-[0_0_8px_rgba(34,197,94,0.5)]"></span> RESOLVED
                            </span>`
                        : `<span class="clay-pressed inline-flex items-center gap-3 px-6 py-2.5 text-[8px] font-black tracking-widest text-[var(--accent-red)]">
                                <span class="w-2.5 h-2.5 rounded-full bg-[var(--accent-red)] animate-pulse shadow-[0_0_8px_rgba(255,77,77,0.5)]"></span> ACTIVE
                            </span>`;

                    return `
                        <tr class="hover:bg-white/30 transition-colors border-b border-slate-300/10">
                            <td class="p-8 text-[var(--text-muted)] font-black tracking-widest">GRID-${displayId}</td>
                            <td class="p-8 text-[var(--text-main)]">
                                <div class="flex items-center gap-5">
                                    <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[9px] text-[var(--text-muted)] font-black uppercase tracking-tighter">${(alert.name || 'U').substring(0, 2)}</div>
                                    <span class="tracking-tighter uppercase font-black">${alert.name || 'Unknown User'}</span>
                                </div>
                            </td>
                            <td class="p-8 text-[8px] text-[var(--text-main)] tracking-[0.2em] font-black">
                                <span class="text-[var(--text-muted)]">LAT:</span> ${parseFloat(alert.latitude || 0).toFixed(4)} <br>
                                <span class="text-[var(--text-muted)] mt-1 block"><span class="text-[var(--text-muted)]">LNG:</span> ${parseFloat(alert.longitude || 0).toFixed(4)}</span>
                            </td>
                            <td class="p-8 text-[var(--text-main)]">
                                <p class="tracking-widest">${dateObj.toLocaleDateString()}</p>
                                <p class="text-[8px] text-[var(--text-muted)] tracking-[0.3em] mt-2">${dateObj.toLocaleTimeString()}</p>
                            </td>
                            <td class="p-8">${statusHtml}</td>
                            <td class="p-8 text-right">
                                <button onclick="alert('Message: ${alert.message || 'No details provided'}')" class="w-12 h-12 clay-icon-btn inline-flex items-center justify-center text-[var(--accent-blue)] hover:scale-110 transition-transform"><i class="fa-solid fa-file-invoice text-lg"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                status.textContent = "Critical Error";
                alert("Critical System Error: " + err.message);
            }
        }

        function exportToCSV() {
            if (currentAlerts.length === 0) {
                alert("No data available to export.");
                return;
            }

            const headers = ["ID", "Name", "Phone", "Latitude", "Longitude", "Message", "Status", "Timestamp"];
            const rows = currentAlerts.map(a => [
                a.id,
                `"${a.name || 'Unknown'}"`,
                a.phone || 'N/A',
                a.latitude,
                a.longitude,
                `"${(a.message || 'EMPTY').replace(/"/g, '""')}"`,
                a.status,
                a.created_at
            ]);

            let csvContent = headers.join(",") + "\n" 
                + rows.map(e => e.join(",")).join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `SOS_History_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert(`✅ Exported ${rows.length} records successfully!`);
        }

        // Fetch on load
        fetchHistory();
    </script>
</body>
