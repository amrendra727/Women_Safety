<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS | Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #e2e8f0;
            --clay-bg: #f8fafc;
            --shadow-outer: #cbd5e1;
            --shadow-inner: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-red: #ff4d4d;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        
        .clay-card {
            background: var(--clay-bg);
            box-shadow: 20px 20px 40px var(--shadow-outer), 
                       -20px -20px 40px var(--shadow-inner),
                       inset 4px 4px 10px rgba(0,0,0,0.03),
                       inset -4px -4px 10px rgba(255,255,255,0.7);
            border-radius: 2.5rem;
        }

        .clay-pressed {
            background: var(--clay-bg);
            box-shadow: inset 8px 8px 16px var(--shadow-outer), 
                        inset -8px -8px 16px var(--shadow-inner);
            border-radius: 1.5rem;
            border: none;
            outline: none;
        }

        .clay-btn {
            background: var(--clay-bg);
            box-shadow: 10px 10px 20px var(--shadow-outer), 
                       -10px -10px 20px var(--shadow-inner),
                       inset 2px 2px 5px rgba(255,255,255,0.8);
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-btn:active {
            transform: scale(0.95);
            box-shadow: inset 6px 6px 12px var(--shadow-outer), 
                        inset -6px -6px 12px var(--shadow-inner);
        }

        .clay-sos {
            background: var(--accent-red);
            box-shadow: 15px 15px 35px rgba(255, 77, 77, 0.4), 
                       -15px -15px 35px var(--shadow-inner),
                       inset 8px 8px 20px rgba(0,0,0,0.15),
                       inset -8px -8px 20px rgba(255,255,255,0.25);
            color: #fff;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .clay-sos:hover {
            transform: scale(1.05);
            box-shadow: 20px 20px 45px rgba(255, 77, 77, 0.5), 
                       -20px -20px 45px var(--shadow-inner);
        }
        .clay-sos:active {
            transform: scale(0.92);
            box-shadow: inset 15px 15px 30px rgba(0,0,0,0.2), 
                        inset -15px -15px 30px rgba(255,255,255,0.1);
        }

        .clay-icon-btn {
            background: var(--clay-bg);
            box-shadow: 8px 8px 16px var(--shadow-outer), 
                       -8px -8px 16px var(--shadow-inner),
                       inset 3px 3px 6px rgba(255,255,255,0.8);
            border-radius: 1rem;
        }

        .neo-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
            animation: neo-pulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
            pointer-events: none;
        }
        @keyframes neo-pulse {
            to { box-shadow: 0 0 0 45px rgba(220, 38, 38, 0); }
        }

        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: blob-float 20s infinite alternate linear;
        }

        @keyframes blob-float {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 100px) rotate(360deg); }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-20 bg-gradient-to-br from-[#e2e8f0] to-[#cbd5e1] overflow-x-hidden relative">
    <div class="bg-blob top-[-10%] left-[-10%]"></div>
    <div class="bg-blob bottom-[-10%] right-[-10%] bg-red-200/20"></div>

    <!-- Navigation -->
    <nav class="w-full p-6 flex justify-between items-center z-20 sticky top-0 bg-[var(--bg-color)]/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 clay-icon-btn flex items-center justify-center text-[var(--accent-red)]">
                <i class="fa-solid fa-shield-heart text-2xl"></i>
            </div>
            <span class="font-extrabold text-2xl tracking-tighter text-[var(--text-main)]">KAVACH</span>
        </div>
        <div class="flex gap-6">
            <a href="ai-assistant.html" class="w-14 h-14 clay-btn flex items-center justify-center text-[var(--accent-blue)]">
                <i class="fa-solid fa-robot text-xl"></i>
            </a>
            <a href="login.html" class="w-14 h-14 clay-btn flex items-center justify-center text-[var(--accent-red)]">
                <i class="fa-solid fa-user-shield text-xl"></i>
            </a>
        </div>
    </nav>

    <main class="w-full max-w-md px-6 flex flex-col items-center flex-1 z-10 mt-6">
        
        <div class="text-center mb-12 floating">
            <h1 class="text-5xl font-black mb-3 text-[var(--text-main)] uppercase tracking-tighter">Emergency <span class="text-[var(--accent-red)]">SOS</span></h1>
            <p class="text-[var(--text-muted)] text-[10px] font-black uppercase tracking-[0.5em] opacity-60">Shield Activated & Ready</p>
        </div>

        <!-- User Details Form -->
        <div class="w-full clay-card p-8 mb-16 border-4 border-white/50">
            <div class="flex items-center gap-3 mb-6 text-[10px] font-black text-[var(--text-muted)] uppercase tracking-widest">
                <i class="fa-solid fa-id-card text-[var(--accent-red)] text-sm"></i> Identification Profile
            </div>
            <div class="space-y-6">
                <input type="text" id="sosName" placeholder="Full Name" class="clay-pressed w-full px-6 py-5 text-sm font-bold placeholder-slate-400">
                <input type="text" id="sosPhone" placeholder="Contact Number" class="clay-pressed w-full px-6 py-5 text-sm font-bold placeholder-slate-400">
                <textarea id="sosMessage" placeholder="What is the emergency?" class="clay-pressed w-full px-6 py-5 text-sm font-bold h-28 resize-none placeholder-slate-400"></textarea>
            </div>
        </div>

        <!-- Giant SOS Button -->
        <div class="relative flex items-center justify-center mb-20">
            <div class="neo-pulse"></div>
            <button id="sosBtn" class="clay-sos w-60 h-60 flex flex-col items-center justify-center z-10 font-black text-6xl tracking-tighter group">
                <i class="fa-solid fa-hand-pointer mb-3 text-4xl group-hover:scale-110 transition-transform"></i>
                SOS
            </button>
        </div>

        <!-- Status Box -->
        <div id="statusBox" class="w-full clay-card p-8 text-center hidden mb-12 border-4 border-white/50 animate-bounce">
            <i class="fa-solid fa-satellite text-[var(--accent-blue)] animate-spin mb-4 text-3xl"></i>
            <p id="statusText" class="text-[var(--text-main)] font-black text-xs uppercase tracking-[0.2em]">Acquiring Signal...</p>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-8 w-full mb-16">
            <a href="tel:112" class="clay-btn p-8 flex flex-col items-center gap-4 text-[var(--text-main)] hover:text-[var(--accent-red)]">
                <div class="w-14 h-14 clay-icon-btn flex items-center justify-center text-[var(--accent-red)]">
                    <i class="fa-solid fa-phone-flip text-xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest">Call 112</span>
            </a>
            <button onclick="shareLocation()" class="clay-btn p-8 flex flex-col items-center gap-4 text-[var(--text-main)] hover:text-[var(--accent-blue)]">
                <div class="w-14 h-14 clay-icon-btn flex items-center justify-center text-[var(--accent-blue)]">
                    <i class="fa-solid fa-share-nodes text-xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest">Share Live</span>
            </button>
        </div>

        <!-- Trusted Contacts -->
        <div class="w-full clay-card p-8 border-4 border-white/50">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="font-black text-[var(--text-main)] uppercase text-sm tracking-tighter">Guardians</h2>
                    <p class="text-[8px] text-[var(--text-muted)] font-black uppercase tracking-widest mt-1">Primary Responders</p>
                </div>
                <button onclick="addContact()" class="clay-icon-btn w-12 h-12 text-[var(--accent-red)] hover:scale-110 transition-transform"><i class="fa-solid fa-plus text-sm"></i></button>
            </div>
            <div class="space-y-6" id="contactsList">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
    </main>

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://zhsgoytovsjpvtdbibbc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dveXRvdnNqcHZ0ZGJpYmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY0MjIsImV4cCI6MjA5MzUzMjQyMn0.jNlo2UQ6aC0UIPc0HxayYjDxWz9WGCvDttTK-AP-LWs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // SOS Button Logic
        document.getElementById('sosBtn').addEventListener('click', () => {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            
            const name = document.getElementById('sosName').value || 'Distressed User';
            const phone = document.getElementById('sosPhone').value || 'Unknown';
            const message = document.getElementById('sosMessage').value || '';
            
            statusBox.classList.remove('hidden');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    try {
                        const { data, error } = await supabaseClient
                            .from('alerts')
                            .insert([
                                { 
                                    name, 
                                    phone, 
                                    message, 
                                    latitude: position.coords.latitude, 
                                    longitude: position.coords.longitude,
                                    status: 'ACTIVE'
                                }
                            ]);

                        if (error) {
                            alert("SOS Dispatch Failed: " + error.message);
                            throw error;
                        }
                        
                        statusText.className = "text-[var(--accent-green)] font-bold uppercase tracking-widest text-xs mt-2";
                        statusText.textContent = "ALERT DISPATCHED TO COMMAND CENTER!";
                        statusBox.querySelector('i').className = "fa-solid fa-check-circle text-[var(--accent-green)] text-3xl";
                    } catch (error) {
                        console.error(error);
                        statusText.className = "text-[#e69b00] font-bold uppercase tracking-widest text-xs mt-2";
                        statusText.textContent = "NETWORK ERROR: COULD NOT DISPATCH ALERT.";
                        statusBox.querySelector('i').className = "fa-solid fa-triangle-exclamation text-[#e69b00] text-3xl";
                    }

                }, (error) => {
                    statusText.className = "text-[#e69b00] font-bold uppercase tracking-widest text-xs mt-2";
                    statusText.textContent = "GPS Failed. Make sure location is allowed.";
                    statusBox.querySelector('i').className = "fa-solid fa-exclamation-triangle text-[#e69b00] text-3xl";
                });
            } else {
                statusText.textContent = "Location services not available.";
            }
        });

        // Share Location Feature
        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const text = encodeURIComponent(`🚨 EMERGENCY! I need help. My current location is: https://maps.google.com/?q=${lat},${lng}`);
                    window.open(`https://wa.me/?text=${text}`, '_blank');
                });
            } else {
                alert("Location services not supported!");
            }
        }

        // Trusted Contacts Logic (LocalStorage)
        let contacts = JSON.parse(localStorage.getItem('trustedContacts')) || [
            { name: "Mom", phone: "+919876543210" },
            { name: "Brother", phone: "+918765432109" }
        ];

        function renderContacts() {
            const list = document.getElementById('contactsList');
            list.innerHTML = contacts.map((c, index) => `
                <div class="flex justify-between items-center clay-pressed p-6">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[var(--text-muted)] pointer-events-none">
                            <i class="fa-solid fa-user-check text-sm"></i>
                        </div>
                        <div>
                            <p class="font-black text-sm text-[var(--text-main)] uppercase tracking-tighter">${c.name}</p>
                            <p class="text-[9px] text-[var(--text-muted)] font-black tracking-widest mt-1">${c.phone}</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <a href="tel:${c.phone}" class="w-12 h-12 flex items-center justify-center clay-btn text-[var(--accent-green)]"><i class="fa-solid fa-phone-flip text-sm"></i></a>
                        <button onclick="removeContact(${index})" class="w-12 h-12 flex items-center justify-center clay-btn text-[var(--accent-red)]"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function addContact() {
            const name = prompt("Enter Contact Name:");
            if (!name) return;
            const phone = prompt("Enter Phone Number:");
            if (!phone) return;
            contacts.push({ name, phone });
            localStorage.setItem('trustedContacts', JSON.stringify(contacts));
            renderContacts();
        }

        function removeContact(index) {
            if(confirm("Remove this contact?")) {
                contacts.splice(index, 1);
                localStorage.setItem('trustedContacts', JSON.stringify(contacts));
                renderContacts();
            }
        }

        renderContacts();
    </script>
</body>
</html>
