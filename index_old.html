<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container">
        <div class="card">
            <div class="header">
                <h2>Register Complaint</h2>
                <p>Please fill out the details below to submit your complaint.</p>
            </div>

            <div id="alertBox" class="alert hidden"></div>

            <form id="complaintForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="e.g. New York" required>
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="10-digit number" pattern="[0-9]{10}"
                        required>
                </div>

                <div class="form-group">
                    <label for="complaint">Complaint Description</label>
                    <textarea id="complaint" name="complaint" rows="3" placeholder="Describe your issue in detail..."
                        required></textarea>
                </div>

                <div class="ai-section" id="aiSection">
                    <button type="button" class="action-btn" id="generateQuestionBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/></svg>
                        <span>Regenerate Question</span>
                    </button>
                    
                    <div id="aiQuestionContainer">
                        <span class="ai-badge">AI ASSISTANT</span>
                        <div class="ai-question-box">
                            <p id="aiQuestionText">"Would you like us to suspend service on it?"</p>
                        </div>
                        
                        <div class="form-group mt-3">
                            <label for="aiAnswer">Your Answer</label>
                            <input type="text" id="aiAnswer" name="aiAnswer" placeholder="" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>Submit Complaint</span>
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
