<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #e2e8f0;
            --clay-bg: #f8fafc;
            --shadow-outer: #cbd5e1;
            --shadow-inner: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-red: #ff4d4d;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden; 
        }
        
        .clay-card {
            background: var(--clay-bg);
            box-shadow: 20px 20px 40px var(--shadow-outer), 
                       -20px -20px 40px var(--shadow-inner),
                       inset 4px 4px 10px rgba(0,0,0,0.03),
                       inset -4px -4px 10px rgba(255,255,255,0.7);
            border-radius: 3rem;
        }

        .clay-pressed {
            background: var(--clay-bg);
            box-shadow: inset 8px 8px 16px var(--shadow-outer), 
                        inset -8px -8px 16px var(--shadow-inner);
            border-radius: 1.5rem;
            border: none;
            outline: none;
        }

        .clay-btn {
            background: var(--clay-bg);
            box-shadow: 10px 10px 20px var(--shadow-outer), 
                       -10px -10px 20px var(--shadow-inner),
                       inset 2px 2px 5px rgba(255,255,255,0.8);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-btn:active {
            transform: scale(0.95);
            box-shadow: inset 6px 6px 12px var(--shadow-outer), 
                        inset -6px -6px 12px var(--shadow-inner);
        }

        .clay-icon-btn {
            background: var(--clay-bg);
            box-shadow: 10px 10px 20px var(--shadow-outer), 
                       -10px -10px 20px var(--shadow-inner),
                       inset 4px 4px 10px rgba(255,255,255,0.8);
            border-radius: 50%;
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>

<body class="h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-[#e2e8f0] to-[#cbd5e1]">

    <div class="z-10 w-full max-w-sm clay-card p-12 relative overflow-hidden m-4 border-4 border-white/50">

        <div class="text-center mb-12 relative">
            <div
                class="inline-flex items-center justify-center w-24 h-24 clay-icon-btn mb-8 pointer-events-none text-[var(--accent-red)]">
                <i class="fa-solid fa-user-lock text-4xl"></i>
            </div>
            <h2 class="font-black text-3xl tracking-tighter uppercase text-[var(--text-main)]">COMMAND <span
                    class="text-[var(--accent-red)]">LOGIN</span></h2>
            <p class="text-[9px] text-[var(--text-muted)] mt-3 uppercase tracking-[0.4em] font-black">Authorized Personnel Only</p>
        </div>

        <form id="loginForm" class="space-y-8">
            <div>
                <label
                    class="block text-[10px] text-[var(--text-muted)] uppercase tracking-widest mb-4 font-black ml-4"><i
                        class="fa-solid fa-fingerprint mr-2 text-[var(--accent-red)]"></i> Badge ID</label>
                <input type="text" id="username" class="clay-pressed w-full px-6 py-5 text-sm font-bold" placeholder="Enter ID"
                    required autocomplete="off">
            </div>

            <div>
                <label
                    class="block text-[10px] text-[var(--text-muted)] uppercase tracking-widest mb-4 font-black ml-4"><i
                        class="fa-solid fa-key mr-2 text-[var(--accent-red)]"></i> Security Token</label>
                <input type="password" id="password" class="clay-pressed w-full px-6 py-5 text-sm font-bold tracking-[0.5em]"
                    placeholder="••••••••" required>
            </div>

            <button type="submit"
                class="w-full clay-btn py-6 px-8 text-[var(--accent-red)] font-black flex items-center justify-center gap-4 uppercase tracking-[0.2em] text-xs hover:scale-[1.02] transition-transform">
                <i class="fa-solid fa-shield-check text-lg"></i> Authorize Access
            </button>
        </form>

        <div class="mt-12 text-center pt-8 border-t border-slate-300/30">
            <a href="index.html"
                class="text-[10px] text-[var(--text-muted)] hover:text-[var(--text-main)] transition font-black uppercase tracking-widest flex items-center justify-center gap-3">
                <i class="fa-solid fa-arrow-left-long"></i> Back to SOS Grid
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin#123') {
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert('🚨 INVALID CREDENTIALS! Access Denied.');
            }
        });
    </script>
</body>

</html>
