<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Safety Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #e2e8f0;
            --clay-bg: #f8fafc;
            --shadow-outer: #cbd5e1;
            --shadow-inner: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-red: #ff4d4d;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden; 
        }
        
        .clay-card {
            background: var(--clay-bg);
            box-shadow: 20px 20px 40px var(--shadow-outer), 
                       -20px -20px 40px var(--shadow-inner),
                       inset 4px 4px 10px rgba(0,0,0,0.03),
                       inset -4px -4px 10px rgba(255,255,255,0.7);
            border-radius: 2.5rem;
        }

        .clay-pressed {
            background: var(--clay-bg);
            box-shadow: inset 8px 8px 16px var(--shadow-outer), 
                        inset -8px -8px 16px var(--shadow-inner);
            border-radius: 1.5rem;
            border: none;
            outline: none;
        }

        .clay-btn {
            background: var(--clay-bg);
            box-shadow: 10px 10px 20px var(--shadow-outer), 
                       -10px -10px 20px var(--shadow-inner),
                       inset 2px 2px 5px rgba(255,255,255,0.8);
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-btn:active {
            transform: scale(0.95);
            box-shadow: inset 6px 6px 12px var(--shadow-outer), 
                        inset -6px -6px 12px var(--shadow-inner);
        }

        .clay-icon-btn {
            background: var(--clay-bg);
            box-shadow: 8px 8px 16px var(--shadow-outer), 
                       -8px -8px 16px var(--shadow-inner),
                       inset 3px 3px 6px rgba(255,255,255,0.8);
            border-radius: 50%;
        }

        .ai-bubble {
            background: var(--clay-bg);
            box-shadow: 15px 15px 30px var(--shadow-outer), 
                       -15px -15px 30px var(--shadow-inner),
                       inset 4px 4px 10px rgba(255,255,255,0.8);
            border-radius: 2rem;
            border-bottom-left-radius: 0.5rem;
        }

        .user-bubble {
            background: var(--clay-bg);
            box-shadow: inset 8px 8px 16px var(--shadow-outer), 
                        inset -8px -8px 16px var(--shadow-inner);
            border-radius: 2rem;
            border-bottom-right-radius: 0.5rem;
            color: var(--accent-red);
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col max-w-md mx-auto relative clay-card md:my-4 mb-10 overflow-hidden border-8 border-white/50">

    <!-- Header -->
    <header class="p-8 flex justify-between items-center z-20 bg-[var(--bg-color)]/80 backdrop-blur-md border-b border-white/30">
        <div class="flex items-center gap-6">
            <a href="index.html" class="w-14 h-14 clay-icon-btn flex items-center justify-center text-[var(--text-main)] hover:text-[var(--accent-red)] transition-all active:scale-90"><i class="fa-solid fa-arrow-left text-lg"></i></a>
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 clay-icon-btn flex items-center justify-center">
                    <i class="fa-solid fa-robot text-[var(--accent-blue)] text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-tighter uppercase">GUARDIAN <span class="text-[var(--accent-blue)]">A.I.</span></h1>
                    <p class="text-[9px] text-[var(--accent-green)] font-black tracking-[0.4em] uppercase mt-1">Ready to protect</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-6 space-y-6" id="chatBox">
        
        <!-- Welcome Message -->
        <div class="flex justify-start msg-anim">
            <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[var(--accent-blue)] mr-5 shrink-0 pointer-events-none mt-auto mb-3">
                <i class="fa-solid fa-robot text-sm"></i>
            </div>
            <div class="ai-bubble max-w-[80%] p-6 text-sm font-black leading-relaxed tracking-tighter uppercase">
                <p class="mb-4 font-black text-[var(--accent-blue)] text-[9px] tracking-[0.3em] uppercase">Security Core Loaded</p>
                Hello. I am your Guardian A.I. How can I assist you with your safety today?
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <footer class="p-8 z-20 bg-[var(--bg-color)]/80 backdrop-blur-md pb-14 md:pb-10 border-t border-white/30">
        <form id="chatForm" class="flex gap-4 relative">
            <input type="text" id="chatInput" class="flex-1 clay-pressed rounded-full px-8 py-5 text-xs font-black tracking-widest uppercase text-[var(--text-main)] placeholder-[var(--text-muted)] focus:outline-none focus:scale-[1.01] transition-transform" placeholder="DESCRIBE SITUATION..." required autocomplete="off">
            <button type="submit" class="absolute right-3 top-2.5 bottom-2.5 w-14 clay-btn flex items-center justify-center text-[var(--accent-red)] active:scale-90 transition-all">
                <i class="fa-solid fa-paper-plane-top text-lg"></i>
            </button>
        </form>
    </footer>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = chatInput.value.trim();
            if (!msg) return;

            appendMessage(msg, 'user');
            chatInput.value = '';

            const typingId = Date.now();
            appendTypingIndicator(typingId);

            try {
                // Mock AI response for GitHub Pages (Serverless)
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                let reply = "I'm analyzing your situation. If you are in immediate danger, please use the SOS button on the home page or dial 112.";
                
                if (msg.toLowerCase().includes('help')) {
                    reply = "Stay calm. If you are being followed, head towards a crowded area or a police station. Keep your phone in hand.";
                } else if (msg.toLowerCase().includes('home') || msg.toLowerCase().includes('cab')) {
                    reply = "Share your live location with a trusted contact immediately. You can do this from the 'Trusted Contacts' section on the main page.";
                }

                document.getElementById(`msg-${typingId}`).remove();
                appendMessage(reply, 'ai');
            } catch (error) {
                document.getElementById(`msg-${typingId}`).remove();
                appendMessage("CONNECTION LOST. If you are in danger, dial emergency services immediately.", 'ai');
            }
        });

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
            
            let html = '';
            
            if(sender === 'ai') {
                html += `
                    <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[var(--accent-blue)] mr-5 shrink-0 pointer-events-none mt-auto mb-3">
                        <i class="fa-solid fa-robot text-sm"></i>
                    </div>
                    <div class="ai-bubble max-w-[80%] p-6 text-sm font-black leading-relaxed tracking-tighter uppercase">
                        ${text}
                    </div>
                `;
            } else {
                html += `
                    <div class="user-bubble max-w-[80%] p-6 text-sm font-black leading-relaxed tracking-tighter uppercase">
                        ${text}
                    </div>
                    <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[var(--text-muted)] ml-5 shrink-0 pointer-events-none mt-auto mb-3">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                `;
            }
            
            div.innerHTML = html;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendTypingIndicator(id) {
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `flex justify-start msg-anim`;
            
            div.innerHTML = `
                <div class="w-12 h-12 clay-icon-btn flex items-center justify-center text-[var(--accent-blue)] mr-5 shrink-0 pointer-events-none mt-auto mb-3">
                    <i class="fa-solid fa-robot text-sm"></i>
                </div>
                <div class="ai-bubble p-6 flex items-center justify-center">
                    <div class="dot-flashing"></div>
                </div>
            `;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
