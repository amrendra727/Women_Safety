<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Safety Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #f1f5f9;
            --shadow-dark: #d1d9e6;
            --shadow-light: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --accent-red: #dc2626;
            --accent-green: #059669;
            --accent-blue: #2563eb;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        
        .neo-bg {
            background-color: var(--bg-color);
        }

        .neo-card {
            background: var(--bg-color);
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                       -10px -10px 20px var(--shadow-light);
            border-radius: 1.5rem;
        }

        .neo-pressed {
            background: var(--bg-color);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            border-radius: 1rem;
            border: none;
            color: var(--text-main);
            outline: none;
        }
        
        .neo-pressed::placeholder {
            color: var(--text-muted);
        }

        .neo-btn {
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                       -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: none;
            outline: none;
            color: var(--text-main);
        }
        .neo-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
        }

        .neo-btn-icon {
            background: var(--bg-color);
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                       -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neo-btn-icon:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
        }

        .neo-sos {
            background: var(--bg-color);
            box-shadow: 14px 14px 28px var(--shadow-dark), 
                       -14px -14px 28px var(--shadow-light);
            color: var(--accent-red);
            font-weight: 800;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .neo-sos:hover {
            transform: scale(1.02);
            box-shadow: 18px 18px 36px var(--shadow-dark), 
                       -18px -18px 36px var(--shadow-light);
        }
        .neo-sos:active {
            box-shadow: inset 10px 10px 20px var(--shadow-dark), 
                        inset -10px -10px 20px var(--shadow-light);
            transform: scale(0.98);
        }

        .neo-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
            animation: neo-pulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
            pointer-events: none;
        }
        @keyframes neo-pulse {
            to { box-shadow: 0 0 0 45px rgba(220, 38, 38, 0); }
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col max-w-md mx-auto relative neo-card my-4 overflow-hidden border-4 border-[var(--bg-color)]">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center z-10 bg-[var(--bg-color)]">
        <div class="flex items-center gap-5">
            <a href="index.html" class="w-12 h-12 rounded-full neo-btn-icon text-[var(--text-main)] hover:text-[var(--accent-red)]"><i class="fa-solid fa-arrow-left text-lg"></i></a>
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full neo-pressed flex items-center justify-center">
                    <i class="fa-solid fa-robot text-[var(--accent-blue)] text-xl"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-xl tracking-wide">A.I. Guardian</h1>
                    <p class="text-[10px] text-[var(--accent-green)] font-bold tracking-widest uppercase mt-1">Online</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-6 space-y-6" id="chatBox">
        
        <!-- Welcome Message -->
        <div class="flex justify-start msg-anim">
            <div class="w-10 h-10 rounded-full neo-btn-icon text-[var(--accent-blue)] mr-4 shrink-0 pointer-events-none mt-auto mb-2">
                <i class="fa-solid fa-robot text-sm"></i>
            </div>
            <div class="neo-card max-w-[80%] rounded-2xl rounded-bl-none p-5 text-sm font-semibold leading-relaxed">
                <p class="mb-3 font-extrabold text-[var(--accent-blue)] text-[10px] tracking-widest uppercase">System Initialized</p>
                Hello. I am your A.I. Guardian. How can I assist you with your safety today? You can ask me for situational safety tips, emergency protocols, or fake call scripts.
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <footer class="p-6 z-10 bg-[var(--bg-color)] pb-8">
        <form id="chatForm" class="flex gap-4 relative">
            <input type="text" id="chatInput" class="flex-1 neo-pressed rounded-full pl-6 pr-14 py-4 text-sm font-bold text-[var(--text-main)] placeholder-[var(--text-muted)] focus:outline-none focus:ring-2 focus:ring-[var(--shadow-light)]" placeholder="Type your situation..." required autocomplete="off">
            <button type="submit" class="absolute right-2 top-2 bottom-2 w-12 rounded-full neo-btn flex items-center justify-center text-[var(--accent-red)]">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </form>
    </footer>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = chatInput.value.trim();
            if (!msg) return;

            appendMessage(msg, 'user');
            chatInput.value = '';

            const typingId = Date.now();
            appendTypingIndicator(typingId);

            try {
                const response = await fetch('http://localhost:3001/api/ai-analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                
                const data = await response.json();
                
                document.getElementById(`msg-${typingId}`).remove();
                appendMessage(data.reply, 'ai');
            } catch (error) {
                document.getElementById(`msg-${typingId}`).remove();
                appendMessage("CONNECTION LOST. If you are in danger, dial emergency services immediately.", 'ai');
            }
        });

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
            
            let html = '';
            
            if(sender === 'ai') {
                html += `
                    <div class="w-10 h-10 rounded-full neo-btn-icon text-[var(--accent-blue)] mr-4 shrink-0 pointer-events-none mt-auto mb-2">
                        <i class="fa-solid fa-robot text-sm"></i>
                    </div>
                    <div class="neo-card max-w-[80%] rounded-2xl rounded-bl-none p-5 text-sm font-semibold leading-relaxed">
                        ${text}
                    </div>
                `;
            } else {
                html += `
                    <div class="neo-pressed max-w-[80%] rounded-2xl rounded-br-none p-5 text-sm font-bold leading-relaxed text-[var(--accent-red)]">
                        ${text}
                    </div>
                    <div class="w-10 h-10 rounded-full neo-btn-icon text-[var(--text-muted)] ml-4 shrink-0 pointer-events-none mt-auto mb-2">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                `;
            }
            
            div.innerHTML = html;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendTypingIndicator(id) {
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `flex justify-start msg-anim`;
            
            div.innerHTML = `
                <div class="w-10 h-10 rounded-full neo-btn-icon text-[var(--accent-blue)] mr-4 shrink-0 pointer-events-none mt-auto mb-2">
                    <i class="fa-solid fa-robot text-sm"></i>
                </div>
                <div class="neo-card rounded-2xl rounded-bl-none py-6 px-8 flex items-center justify-center">
                    <div class="dot-flashing ml-3"></div>
                </div>
            `;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
