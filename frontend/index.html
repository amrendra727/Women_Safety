<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS | Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #f1f5f9;
            --shadow-dark: #d1d9e6;
            --shadow-light: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --accent-red: #dc2626;
            --accent-green: #059669;
            --accent-blue: #2563eb;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        
        .neo-bg {
            background-color: var(--bg-color);
        }

        .neo-card {
            background: var(--bg-color);
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                       -10px -10px 20px var(--shadow-light);
            border-radius: 1.5rem;
        }

        .neo-pressed {
            background: var(--bg-color);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            border-radius: 1rem;
            border: none;
            color: var(--text-main);
            outline: none;
        }
        
        .neo-pressed::placeholder {
            color: var(--text-muted);
        }

        .neo-btn {
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                       -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: none;
            outline: none;
            color: var(--text-main);
        }
        .neo-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
        }

        .neo-btn-icon {
            background: var(--bg-color);
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                       -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neo-btn-icon:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
        }

        .neo-sos {
            background: var(--bg-color);
            box-shadow: 14px 14px 28px var(--shadow-dark), 
                       -14px -14px 28px var(--shadow-light);
            color: var(--accent-red);
            font-weight: 800;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .neo-sos:hover {
            transform: scale(1.02);
            box-shadow: 18px 18px 36px var(--shadow-dark), 
                       -18px -18px 36px var(--shadow-light);
        }
        .neo-sos:active {
            box-shadow: inset 10px 10px 20px var(--shadow-dark), 
                        inset -10px -10px 20px var(--shadow-light);
            transform: scale(0.98);
        }

        .neo-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
            animation: neo-pulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
            pointer-events: none;
        }
        @keyframes neo-pulse {
            to { box-shadow: 0 0 0 45px rgba(220, 38, 38, 0); }
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-10">

    <!-- Navigation -->
    <nav class="w-full p-6 flex justify-between items-center z-10 sticky top-0 neo-bg">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full neo-btn-icon flex items-center justify-center text-[var(--accent-red)]">
                <i class="fa-solid fa-shield-halved text-xl"></i>
            </div>
            <span class="font-extrabold text-2xl tracking-wide">SafeGuard</span>
        </div>
        <div class="flex gap-5">
            <a href="ai-assistant.html" class="w-12 h-12 rounded-full neo-btn flex items-center justify-center text-[var(--text-main)] hover:text-[var(--accent-red)]">
                <i class="fa-solid fa-robot text-lg"></i>
            </a>
            <a href="login.html" class="w-12 h-12 rounded-full neo-btn flex items-center justify-center text-[var(--text-main)] hover:text-[var(--accent-red)]">
                <i class="fa-solid fa-lock text-lg"></i>
            </a>
        </div>
    </nav>

    <main class="w-full max-w-md px-6 flex flex-col items-center flex-1 z-10 mt-6">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold mb-2 text-[var(--accent-red)]">Emergency SOS</h1>
            <p class="text-[var(--text-muted)] text-sm font-semibold">Tap the button below to alert help.</p>
        </div>

        <!-- User Details Form -->
        <div class="w-full neo-card p-6 mb-12">
            <div class="flex items-center gap-2 mb-4 text-xs font-bold text-[var(--text-muted)] uppercase tracking-wider">
                <i class="fa-solid fa-user-tag text-[var(--accent-red)]"></i> Victim Identification
            </div>
            <input type="text" id="sosName" placeholder="Your Name" class="neo-pressed w-full px-5 py-4 mb-4 text-sm font-semibold">
            <input type="text" id="sosPhone" placeholder="Your Phone Number" class="neo-pressed w-full px-5 py-4 mb-4 text-sm font-semibold">
            <textarea id="sosMessage" placeholder="Nature of Emergency..." class="neo-pressed w-full px-5 py-4 text-sm font-semibold h-24 resize-none"></textarea>
        </div>

        <!-- Giant SOS Button -->
        <div class="relative flex items-center justify-center mb-16 mt-2 w-56 h-56">
            <div class="neo-pulse"></div>
            <button id="sosBtn" class="neo-sos w-48 h-48 rounded-full flex flex-col items-center justify-center z-10 font-black text-5xl tracking-widest relative">
                <i class="fa-solid fa-fingerprint mb-2 text-4xl"></i>
                SOS
            </button>
        </div>

        <!-- Status Box -->
        <div id="statusBox" class="w-full neo-card p-5 text-center hidden mb-10">
            <i class="fa-solid fa-satellite-dish text-[var(--accent-blue)] animate-pulse mb-3 text-2xl"></i>
            <p id="statusText" class="text-[var(--accent-blue)] font-bold text-sm uppercase tracking-widest">Acquiring Signal...</p>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-6 w-full mb-10">
            <a href="tel:112" class="neo-btn p-6 flex flex-col items-center gap-3 text-[var(--text-main)] hover:text-[var(--accent-green)] rounded-2xl">
                <i class="fa-solid fa-phone text-2xl"></i>
                <span class="text-sm font-bold">Call Police</span>
            </a>
            <button onclick="shareLocation()" class="neo-btn p-6 flex flex-col items-center gap-3 text-[var(--text-main)] hover:text-[var(--accent-blue)] rounded-2xl">
                <i class="fa-solid fa-location-dot text-2xl"></i>
                <span class="text-sm font-bold">Share Location</span>
            </button>
        </div>

        <!-- Trusted Contacts -->
        <div class="w-full neo-card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-extrabold text-[var(--text-main)] uppercase text-sm tracking-wider"><i class="fa-solid fa-users mr-2 text-[var(--accent-red)]"></i> Trusted Contacts</h2>
                <button onclick="addContact()" class="neo-btn px-4 py-2 rounded-full text-[var(--text-main)] text-xs font-bold uppercase tracking-widest hover:text-[var(--accent-red)]"><i class="fa-solid fa-plus mr-1"></i> Add</button>
            </div>
            <div class="space-y-4" id="contactsList">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
    </main>

    <script>
        // SOS Button Logic
        document.getElementById('sosBtn').addEventListener('click', () => {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            
            const name = document.getElementById('sosName').value || 'Distressed User';
            const phone = document.getElementById('sosPhone').value || 'Unknown';
            const message = document.getElementById('sosMessage').value || '';
            
            statusBox.classList.remove('hidden');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    try {
                        const response = await fetch('http://localhost:3001/api/sos', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name,
                                phone,
                                message,
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude
                            })
                        });

                        const data = await response.json();
                        
                        if (data.success) {
                            statusText.className = "text-[var(--accent-red)] font-bold uppercase tracking-widest text-xs mt-2";
                            statusText.textContent = "ALERT DISPATCHED TO COMMAND CENTER!";
                            statusBox.querySelector('i').className = "fa-solid fa-check-circle text-[var(--accent-red)] text-3xl";
                        } else {
                            throw new Error("Server rejected the alert.");
                        }
                    } catch (error) {
                        console.error(error);
                        statusText.className = "text-[#e69b00] font-bold uppercase tracking-widest text-xs mt-2";
                        statusText.textContent = "NETWORK ERROR: COULD NOT DISPATCH ALERT.";
                        statusBox.querySelector('i').className = "fa-solid fa-triangle-exclamation text-[#e69b00] text-3xl";
                    }

                }, (error) => {
                    statusText.className = "text-[#e69b00] font-bold uppercase tracking-widest text-xs mt-2";
                    statusText.textContent = "GPS Failed. Make sure location is allowed.";
                    statusBox.querySelector('i').className = "fa-solid fa-exclamation-triangle text-[#e69b00] text-3xl";
                });
            } else {
                statusText.textContent = "Location services not available.";
            }
        });

        // Share Location Feature
        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const text = encodeURIComponent(`🚨 EMERGENCY! I need help. My current location is: https://maps.google.com/?q=${lat},${lng}`);
                    window.open(`https://wa.me/?text=${text}`, '_blank');
                });
            } else {
                alert("Location services not supported!");
            }
        }

        // Trusted Contacts Logic (LocalStorage)
        let contacts = JSON.parse(localStorage.getItem('trustedContacts')) || [
            { name: "Mom", phone: "+919876543210" },
            { name: "Brother", phone: "+918765432109" }
        ];

        function renderContacts() {
            const list = document.getElementById('contactsList');
            list.innerHTML = contacts.map((c, index) => `
                <div class="flex justify-between items-center bg-[var(--bg-color)] p-4 rounded-xl">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full neo-btn-icon flex items-center justify-center text-[var(--text-muted)] pointer-events-none">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div>
                            <p class="font-extrabold text-sm text-[var(--text-main)]">${c.name}</p>
                            <p class="text-[11px] text-[var(--text-muted)] font-bold tracking-widest">${c.phone}</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <a href="tel:${c.phone}" class="w-10 h-10 flex items-center justify-center neo-btn text-[var(--accent-green)] rounded-full"><i class="fa-solid fa-phone text-sm"></i></a>
                        <button onclick="removeContact(${index})" class="w-10 h-10 flex items-center justify-center neo-btn text-[var(--accent-red)] rounded-full"><i class="fa-solid fa-trash text-sm"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function addContact() {
            const name = prompt("Enter Contact Name:");
            if (!name) return;
            const phone = prompt("Enter Phone Number:");
            if (!phone) return;
            contacts.push({ name, phone });
            localStorage.setItem('trustedContacts', JSON.stringify(contacts));
            renderContacts();
        }

        function removeContact(index) {
            if(confirm("Remove this contact?")) {
                contacts.splice(index, 1);
                localStorage.setItem('trustedContacts', JSON.stringify(contacts));
                renderContacts();
            }
        }

        renderContacts();
    </script>
</body>
</html>
