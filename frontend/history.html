<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #f1f5f9;
            --shadow-dark: #d1d9e6;
            --shadow-light: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --accent-red: #dc2626;
            --accent-green: #059669;
            --accent-blue: #2563eb;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        
        .neo-bg {
            background-color: var(--bg-color);
        }

        .neo-card {
            background: var(--bg-color);
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                       -10px -10px 20px var(--shadow-light);
            border-radius: 1.5rem;
        }

        .neo-pressed {
            background: var(--bg-color);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            border-radius: 1rem;
            border: none;
            color: var(--text-main);
            outline: none;
        }
        
        .neo-pressed::placeholder {
            color: var(--text-muted);
        }

        .neo-btn {
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                       -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: none;
            outline: none;
            color: var(--text-main);
        }
        .neo-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
        }

        .neo-btn-icon {
            background: var(--bg-color);
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                       -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neo-btn-icon:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
        }

        .neo-sos {
            background: var(--bg-color);
            box-shadow: 14px 14px 28px var(--shadow-dark), 
                       -14px -14px 28px var(--shadow-light);
            color: var(--accent-red);
            font-weight: 800;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .neo-sos:hover {
            transform: scale(1.02);
            box-shadow: 18px 18px 36px var(--shadow-dark), 
                       -18px -18px 36px var(--shadow-light);
        }
        .neo-sos:active {
            box-shadow: inset 10px 10px 20px var(--shadow-dark), 
                        inset -10px -10px 20px var(--shadow-light);
            transform: scale(0.98);
        }

        .neo-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
            animation: neo-pulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
            pointer-events: none;
        }
        @keyframes neo-pulse {
            to { box-shadow: 0 0 0 45px rgba(220, 38, 38, 0); }
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col gap-8 max-w-6xl mx-auto w-full">

    <header class="flex justify-between items-center px-4">
        <div class="flex items-center gap-5">
            <div class="w-14 h-14 rounded-full neo-btn-icon text-[var(--accent-red)] pointer-events-none">
                <i class="fa-solid fa-clock-rotate-left text-2xl"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-3xl text-[var(--text-main)] tracking-wide">Incident History</h1>
                <p class="text-xs text-[var(--text-muted)] font-bold tracking-widest uppercase mt-1">Classified Police Records</p>
            </div>
        </div>
        
        <div class="flex gap-5">
            <button class="neo-btn px-6 py-3 rounded-full text-sm font-bold tracking-wider text-[var(--text-main)] flex items-center gap-3">
                <i class="fa-solid fa-download text-[var(--accent-blue)]"></i> Export CSV
            </button>
            <a href="dashboard.html" class="neo-btn px-6 py-3 rounded-full text-sm font-bold tracking-wider text-[var(--accent-red)] flex items-center gap-3">
                <i class="fa-solid fa-arrow-left"></i> Back to Command
            </a>
        </div>
    </header>

    <div class="neo-card flex-1 flex flex-col overflow-hidden mb-4 border-8 border-[var(--bg-color)]">
        <div class="overflow-x-auto flex-1 neo-pressed m-6 rounded-2xl">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="text-[10px] uppercase tracking-widest text-[var(--text-muted)] font-extrabold">
                        <th class="p-6 border-b border-[#cbbdb1]/20">Incident ID</th>
                        <th class="p-6 border-b border-[#cbbdb1]/20">Victim / User</th>
                        <th class="p-6 border-b border-[#cbbdb1]/20">Coordinates</th>
                        <th class="p-6 border-b border-[#cbbdb1]/20">Timestamp</th>
                        <th class="p-6 border-b border-[#cbbdb1]/20">Status</th>
                        <th class="p-6 border-b border-[#cbbdb1]/20 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="text-sm font-bold">
                    <!-- Dynamically populated via JS -->
                </tbody>
            </table>
        </div>
        
        <div class="px-8 pb-8 pt-2 flex justify-between items-center text-[10px] text-[var(--text-muted)] font-extrabold uppercase tracking-widest">
            <span>Total Records: <span id="totalRecords">0</span></span>
        </div>
    </div>

    <script>
        async function fetchHistory() {
            try {
                const res = await fetch('http://localhost:3001/api/alerts/history');
                const alerts = await res.json();
                
                const tbody = document.getElementById('historyTable');
                document.getElementById('totalRecords').textContent = alerts.length;
                
                if (alerts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-[var(--text-muted)]">No incident history found.</td></tr>';
                    return;
                }

                tbody.innerHTML = alerts.map(alert => {
                    const isResolved = alert.status === 'RESOLVED';
                    const time = alert.time || new Date().toISOString();
                    const dateObj = new Date(time);
                    
                    const statusHtml = isResolved 
                        ? \`<span class="neo-btn inline-flex items-center gap-2 px-4 py-2 rounded-full text-[10px] font-extrabold tracking-widest text-[var(--accent-green)] pointer-events-none">
                                <span class="w-2 h-2 rounded-full bg-[var(--accent-green)]"></span> RESOLVED
                            </span>\`
                        : \`<span class="neo-btn inline-flex items-center gap-2 px-4 py-2 rounded-full text-[10px] font-extrabold tracking-widest text-[var(--accent-red)] pointer-events-none">
                                <span class="w-2 h-2 rounded-full bg-[var(--accent-red)] animate-pulse"></span> ACTIVE
                            </span>\`;

                    return \`
                        <tr class="hover:bg-[var(--shadow-light)]/20 transition-colors">
                            <td class="p-6 text-[var(--text-muted)] font-mono">INC-\${alert.id.toString().slice(-4)}</td>
                            <td class="p-6 text-[var(--text-main)]">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full neo-btn-icon text-xs text-[var(--text-muted)] font-bold uppercase">\${(alert.name || 'U').substring(0, 2)}</div>
                                    \${alert.name || 'Distressed User'}
                                </div>
                            </td>
                            <td class="p-6 text-xs text-[var(--text-main)] tracking-wide font-mono">
                                <span class="text-[var(--text-muted)]">LAT:</span> \${parseFloat(alert.latitude || 0).toFixed(4)} <br>
                                <span class="text-[var(--text-muted)]">LNG:</span> \${parseFloat(alert.longitude || 0).toFixed(4)}
                            </td>
                            <td class="p-6 text-[var(--text-main)]">
                                <p>\${dateObj.toLocaleDateString()}</p>
                                <p class="text-[10px] text-[var(--text-muted)] tracking-widest mt-1">\${dateObj.toLocaleTimeString()}</p>
                            </td>
                            <td class="p-6">\${statusHtml}</td>
                            <td class="p-6 text-right">
                                <button onclick="alert('Message: \${alert.message || 'No details provided'}')" class="w-10 h-10 rounded-full neo-btn-icon inline-flex text-[var(--accent-blue)]"><i class="fa-solid fa-file-lines"></i></button>
                            </td>
                        </tr>
                    \`;
                }).join('');

            } catch (err) {
                console.error("Failed to fetch history:", err);
            }
        }

        // Fetch on load
        fetchHistory();
    </script>
</body>
</html>
